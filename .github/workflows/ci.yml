name: CI

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  analyze:
    name: Static Analyze
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run static analysis
        run: flutter analyze

  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run unit and widget tests
        run: flutter test

  build_release:
    name: Build Release APK
    runs-on: ubuntu-latest
    needs:
      - analyze
      - test

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload release artifact
        id: upload_apk
        uses: actions/upload-artifact@v4
        with:
          name: flutter_offline_music_${{ github.run_number }}
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Generate release notes from commits
        id: release_notes
        shell: bash
        run: |
          CURRENT_TAG="${GITHUB_REF_NAME}"
          PREV_TAG="$(git describe --tags --abbrev=0 "${GITHUB_SHA}^" 2>/dev/null || true)"

          if [ -n "$PREV_TAG" ]; then
            NOTES="$(git log --pretty=format:'- %s (%h)' "${PREV_TAG}..${GITHUB_SHA}")"
          else
            NOTES="$(git log --pretty=format:'- %s (%h)' "${GITHUB_SHA}")"
          fi

          if [ -z "$NOTES" ]; then
            NOTES="- No commit messages found."
          fi

          {
            echo "previous_tag=$PREV_TAG"
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            Changes since previous release `${{ steps.release_notes.outputs.previous_tag || 'N/A' }}`:

            ${{ steps.release_notes.outputs.notes }}
          files: build/app/outputs/flutter-apk/app-release.apk
